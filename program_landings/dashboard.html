<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'none';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline';
      connect-src https://zyzjhux1z7.execute-api.us-gov-west-1.amazonaws.com https://cognito-idp.us-gov-west-1.amazonaws.com;
      img-src 'self' data:;
      font-src 'self';
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <title>HALT Referral Dashboard</title>
    <link rel="stylesheet" href="/program_landings/dashboard-shared.css" />
    <link rel="stylesheet" href="/program_landings/dashboard.css" />
  </head>
  <body>
    <script src="/program_landings/auth-config.js"></script>
    <script src="/program_landings/auth.js"></script>

    <!-- ── Header ─────────────────────────────────────────────────────────────── -->
    <header>
      <div class="logo">
        <div>
          <h1>HALT Referral Dashboard</h1>
          <div class="meta" id="headerMeta"></div>
          <script>
            (function () {
              var cfg = window.HALT_AUTH_CONFIG || {};
              var meta = cfg.agencyName && cfg.programFullName
                ? cfg.agencyName + " \u2014 " + cfg.programFullName
                : "";
              document.getElementById("headerMeta").textContent = meta;
            })();
          </script>
        </div>
      </div>
      <div class="user-info">
        <span id="headerState" style="display:none"></span>
        <div class="user-detail">
          <strong id="headerEmail"></strong>
        </div>
        <div style="font-size: 0.8rem; opacity: 0.7" id="lastRefreshed"></div>
        <div class="nav-dropdown">
          <button class="nav-dropdown-btn" id="navBtn" aria-haspopup="true" aria-expanded="false" aria-controls="navMenu" onclick="toggleNavMenu()">
            <span aria-hidden="true" style="font-size:1.1rem;line-height:1;letter-spacing:1px">☰</span>
            <span class="sr-only">Open menu</span>
          </button>
          <div class="nav-dropdown-menu" id="navMenu" role="menu">
            <a href="/program_landings/admin.html" id="adminNavLink" role="menuitem" style="display:none">Admin</a>
            <hr class="menu-divider" id="adminNavDivider" style="display:none" />
            <a href="#" role="menuitem" onclick="event.preventDefault(); Auth.logout()">Sign Out</a>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Main ───────────────────────────────────────────────────────────────── -->
    <main>
      <!-- Stats -->
      <div class="stats-bar" id="statsBar">
        <div class="stat-card">
          <div class="label">Total</div>
          <div class="value" id="statTotal">–</div>
        </div>
        <div class="stat-card new">
          <div class="label">New</div>
          <div class="value" id="statNew">–</div>
        </div>
        <div class="stat-card contacted">
          <div class="label">Contacted</div>
          <div class="value" id="statContacted">–</div>
        </div>
        <div class="stat-card enrolled">
          <div class="label">Enrolled</div>
          <div class="value" id="statEnrolled">–</div>
        </div>
        <div class="stat-card other">
          <div class="label">Other</div>
          <div class="value" id="statOther">–</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="filter-group">
          <label for="filterProgram">Program</label>
          <select id="filterProgram" onchange="applyFilters()">
            <option value="">All Programs</option>
            <option value="Lose Weight">Lose Weight</option>
            <option value="Lower Blood Pressure">Lower Blood Pressure</option>
            <option value="Lower Blood Sugar">Lower Blood Sugar</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterStatus">Status</label>
          <select id="filterStatus" onchange="applyFilters()">
            <option value="">All Statuses</option>
            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="enrolled">Enrolled</option>
            <option value="not_eligible">Not Eligible</option>
            <option value="no_response">No Response</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterSearch">Search</label>
          <input
            type="text"
            id="filterSearch"
            placeholder="Name, email, phone, zip…"
            oninput="applyFilters()"
          />
        </div>
        <button
          class="btn btn-secondary"
          id="clearFiltersBtn"
          onclick="clearFilters()"
          disabled
        >
          Clear filters
        </button>
        <button class="btn btn-primary btn-refresh" onclick="loadReferrals()">
          ↻ Refresh
        </button>
      </div>
      <div class="filter-summary" id="activeFilters" hidden></div>

      <!-- Table -->
      <div class="table-wrap">
        <div class="table-meta">
          <span class="count" id="rowCount" role="status" aria-live="polite">Loading…</span>
        </div>
        <div id="tableContainer">
          <div class="state-msg"><span class="spinner"></span></div>
        </div>
      </div>
    </main>

    <script>
      // ── Config ────────────────────────────────────────────────────────────────────
      const API_BASE =
        "https://zyzjhux1z7.execute-api.us-gov-west-1.amazonaws.com";

      // ── State ─────────────────────────────────────────────────────────────────────
      let allReferrals = [];
      let filtered = [];
      let sortCol = "submitted_at";
      let sortDir = "desc";
      let expandedId = null;
      let linkedReferralId = getLinkedId();
      let _isLoadingReferrals = false;

      // ── Nav dropdown ─────────────────────────────────────────────────────────
      function toggleNavMenu() {
        const menu = document.getElementById("navMenu");
        const btn  = document.getElementById("navBtn");
        const open = menu.classList.toggle("open");
        btn.setAttribute("aria-expanded", String(open));
      }
      document.addEventListener("click", (e) => {
        const dropdown = document.querySelector(".nav-dropdown");
        if (dropdown && !dropdown.contains(e.target)) {
          document.getElementById("navMenu").classList.remove("open");
          document.getElementById("navBtn").setAttribute("aria-expanded", "false");
        }
      });

      function _showAdminLinkIfAdmin() {
        const isAdmin = Auth.isAdmin();
        document.getElementById("adminNavLink").style.display    = isAdmin ? "block" : "none";
        document.getElementById("adminNavDivider").style.display = isAdmin ? "block" : "none";
      }

      // ── Auth bootstrap ────────────────────────────────────────────────────────────
      Auth.onReady(() => {
        document.getElementById("headerEmail").textContent = Auth.getEmail();
        document.getElementById("headerState").textContent = Auth.getState();
        _showAdminLinkIfAdmin();
        loadReferrals();
      });

      document.addEventListener("halt:authenticated", () => {
        document.getElementById("headerEmail").textContent = Auth.getEmail();
        document.getElementById("headerState").textContent = Auth.getState();
        _showAdminLinkIfAdmin();
        loadReferrals();
      });

      document.addEventListener("halt:logout", () => {
        // Clear all referral data and PII from the DOM before login screen appears.
        document.getElementById("adminNavLink").style.display    = "none";
        document.getElementById("adminNavDivider").style.display = "none";
        document.getElementById("navMenu").classList.remove("open");
        document.getElementById("navBtn").setAttribute("aria-expanded", "false");
        allReferrals = [];
        filtered = [];
        document.getElementById("headerEmail").textContent = "";
        document.getElementById("headerState").textContent = "";
        document.getElementById("lastRefreshed").textContent = "";
        document.getElementById("tableContainer").innerHTML = "";
        document.getElementById("statTotal").textContent = "–";
        document.getElementById("statNew").textContent = "–";
        document.getElementById("statContacted").textContent = "–";
        document.getElementById("statEnrolled").textContent = "–";
        document.getElementById("statOther").textContent = "–";
        document.getElementById("filterProgram").value = "";
        document.getElementById("filterStatus").value = "";
      });

      // Return ?id= from the URL (used when linking directly from a notification email)
      function getLinkedId() {
        return new URLSearchParams(window.location.search).get("id") || null;
      }

      function clearLinkedReferralQueryParam() {
        const url = new URL(window.location.href);
        url.searchParams.delete("id");
        const next = `${url.pathname}${url.search}${url.hash}`;
        window.history.replaceState({}, "", next);
      }

      function getActiveFilters() {
        const filters = [];
        const program = document.getElementById("filterProgram").value;
        const status = document.getElementById("filterStatus").value;
        const search = document.getElementById("filterSearch").value.trim();

        if (linkedReferralId) {
          filters.push({
            label: "Email link",
            value: shortId(linkedReferralId),
          });
        }
        if (program) {
          filters.push({ label: "Program", value: program });
        }
        if (status) {
          filters.push({ label: "Status", value: statusLabel(status) });
        }
        if (search) {
          filters.push({ label: "Search", value: search });
        }

        return filters;
      }

      function renderActiveFilters() {
        const container = document.getElementById("activeFilters");
        const clearBtn = document.getElementById("clearFiltersBtn");
        const activeFilters = getActiveFilters();
        const hasLinked = !!linkedReferralId;
        const hasFilters = activeFilters.length > 0;

        // Enable Clear whenever anything is filtering the view
        clearBtn.disabled = !hasLinked && !hasFilters;

        if (!hasLinked && !hasFilters) {
          container.hidden = true;
          container.innerHTML = "";
          return;
        }

        // Build chips
        let chips = "";

        if (hasLinked) {
          chips += `<span class="filter-chip filter-chip-linked">
            <strong>📧 Viewing referral from email link</strong>
          </span>`;
        }

        chips += activeFilters
          .map(
            (f) =>
              `<span class="filter-chip"><strong>${escHtml(f.label)}:</strong> ${escHtml(f.value)}</span>`,
          )
          .join("");

        container.hidden = false;
        container.innerHTML =
          '<span class="filter-summary-label">Active filters</span>' +
          chips +
          '<span class="filter-summary-hint">Click <strong>Clear filters</strong> to see all referrals.</span>';
      }

      // ── Load Referrals ────────────────────────────────────────────────────────────
      async function loadReferrals() {
        if (_isLoadingReferrals) return;
        _isLoadingReferrals = true;
        document.getElementById("tableContainer").innerHTML =
          '<div class="state-msg"><span class="spinner"></span></div>';
        document.getElementById("rowCount").textContent = "Loading…";

        try {
          await Auth.ensureValidToken();
          const fetch_referrals_response = await fetch(`${API_BASE}/referrals`, {
            headers: { Authorization: `Bearer ${Auth.getToken()}` },
          });

          if (fetch_referrals_response.status === 401) {
            // Token was rejected — force re-login.
            Auth.logout();
            return;
          }
          if (fetch_referrals_response.status === 403) {
            // Valid token but missing state assignment — re-login won't help.
            document.getElementById("tableContainer").innerHTML =
              '<div class="state-msg"><span class="icon">⚠️</span>Your account is not assigned to a state. Contact an administrator.</div>';
            return;
          }

          if (!fetch_referrals_response.ok) throw new Error(`HTTP ${fetch_referrals_response.status}`);
          const data = await fetch_referrals_response.json();
          allReferrals = data.referrals || data.items || [];
          updateStats();

          linkedReferralId = getLinkedId();
          if (linkedReferralId) {
            const match = allReferrals.find(
              (r) => r.submission_id === linkedReferralId,
            );
            if (match) {
              expandedId = linkedReferralId;
            } else {
              linkedReferralId = null;
              clearLinkedReferralQueryParam();
            }
          }

          applyFilters();

          const now = new Date();
          document.getElementById("lastRefreshed").textContent =
            "Last refreshed: " + now.toLocaleTimeString();
        } catch (err) {
          document.getElementById("tableContainer").innerHTML =
            `<div class="state-msg"><span class="icon">⚠️</span>Failed to load referrals.<br><small>${err.message}</small></div>`;
          document.getElementById("rowCount").textContent = "Error";
        } finally {
          _isLoadingReferrals = false;
        }
      }

      // ── Stats ─────────────────────────────────────────────────────────────────────
      function updateStats() {
        const counts = { new: 0, contacted: 0, enrolled: 0, other: 0 };
        allReferrals.forEach((r) => {
          if (r.status === "new") counts.new++;
          else if (r.status === "contacted") counts.contacted++;
          else if (r.status === "enrolled") counts.enrolled++;
          else counts.other++;
        });
        document.getElementById("statTotal").textContent = allReferrals.length;
        document.getElementById("statNew").textContent = counts.new;
        document.getElementById("statContacted").textContent = counts.contacted;
        document.getElementById("statEnrolled").textContent = counts.enrolled;
        document.getElementById("statOther").textContent = counts.other;
      }

      // ── Filters ───────────────────────────────────────────────────────────────────
      function applyFilters() {
        const prog = document.getElementById("filterProgram").value;
        const status = document.getElementById("filterStatus").value;
        const search = document
          .getElementById("filterSearch")
          .value.toLowerCase()
          .trim();

        if (prog || status || search) {
          expandedId = null;
        }

        filtered = allReferrals.filter((r) => {
          if (linkedReferralId && r.submission_id !== linkedReferralId) {
            return false;
          }
          if (prog && r.landing_page !== prog) return false;
          if (status && r.status !== status) return false;
          if (search) {
            const haystack = [r.name, r.email, r.phone, r.zipcode, r.motivation]
              .join(" ")
              .toLowerCase();
            if (!haystack.includes(search)) return false;
          }
          return true;
        });

        sortData();
        renderActiveFilters();
        renderTable();
      }

      function clearFilters() {
        document.getElementById("filterProgram").value = "";
        document.getElementById("filterStatus").value = "";
        document.getElementById("filterSearch").value = "";
        linkedReferralId = null;
        expandedId = null;
        clearLinkedReferralQueryParam();
        applyFilters();
      }

      // ── Sort ──────────────────────────────────────────────────────────────────────
      function sortBy(col) {
        if (sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
        else {
          sortCol = col;
          sortDir = col === "submitted_at" ? "desc" : "asc";
        }
        sortData();
        renderTable();
      }

      function sortData() {
        filtered.sort((a, b) => {
          let va = (a[sortCol] || "").toString().toLowerCase();
          let vb = (b[sortCol] || "").toString().toLowerCase();
          if (va < vb) return sortDir === "asc" ? -1 : 1;
          if (va > vb) return sortDir === "asc" ? 1 : -1;
          return 0;
        });
      }

      // ── Render Table ──────────────────────────────────────────────────────────────
      const COLS = [
        { key: "submitted_at", label: "Date / Time" },
        { key: "name", label: "Name" },
        { key: "landing_page", label: "Program" },
        { key: "status", label: "Status" },
        { key: "state", label: "State" },
        { key: "zipcode", label: "ZIP" },
      ];

      function renderTable() {
        const activeFilters = getActiveFilters();
        const countLabel =
          `${filtered.length} referral${filtered.length !== 1 ? "s" : ""}` +
          (filtered.length !== allReferrals.length
            ? ` of ${allReferrals.length} total`
            : "");

        document.getElementById("rowCount").textContent = activeFilters.length
          ? `Filtered results: ${countLabel}`
          : countLabel;

        if (!filtered.length) {
          document.getElementById("tableContainer").innerHTML =
            '<div class="state-msg"><span class="icon">📭</span>No referrals match the current filters.</div>';
          return;
        }

        let html = `<table aria-label="Referral records"><caption class="sr-only">Referral records</caption><thead><tr>`;
        COLS.forEach((c) => {
          const cls = sortCol === c.key ? " sorted" : "";
          const arrow =
            sortCol === c.key ? (sortDir === "asc" ? "▲" : "▼") : "⇅";
          const sortDesc = sortCol === c.key ? (sortDir === "asc" ? ", sorted ascending" : ", sorted descending") : "";
          html += `<th class="${cls}"><button class="sort-btn" onclick="sortBy('${c.key}')">${c.label} <span class="sort-icon" aria-hidden="true">${arrow}</span><span class="sr-only">${sortDesc}</span></button></th>`;
        });
        html += "<th>Actions</th></tr></thead><tbody>";

        filtered.forEach((r) => {
          const expanded = expandedId === r.submission_id;
          html += `<tr onclick="toggleExpand('${r.submission_id}')" onkeydown="if(event.key==='Enter'||event.key===' '){toggleExpand('${r.submission_id}');event.preventDefault();}" tabindex="0" role="row" aria-expanded="${expanded}" class="${expanded ? "expanded" : ""}">`;
          COLS.forEach((c) => {
            if (c.key === "status") html += `<td>${statusBadge(r.status)}</td>`;
            else if (c.key === "landing_page")
              html += `<td>${programBadge(r.landing_page)}</td>`;
            else if (c.key === "submitted_at")
              html += `<td>${formatDate(r.submitted_at)}</td>`;
            else html += `<td>${escHtml(r[c.key] || "–")}</td>`;
          });
          html += `<td><span style="font-size:.8rem;color:#666;">${expanded ? "▲ Hide" : "▼ View"}</span></td>`;
          html += "</tr>";

          if (expanded) {
            html += `<tr class="detail-row"><td colspan="${COLS.length + 1}">`;
            html += detailPanel(r);
            html += "</td></tr>";
          }
        });

        html += "</tbody></table>";
        document.getElementById("tableContainer").innerHTML = html;
      }

      // ── Detail Panel ──────────────────────────────────────────────────────────────
      function detailPanel(r) {
        return `
  <div class="detail-panel">
    <div class="detail-section">
      <h3>Contact Information</h3>
      <div class="detail-field"><div class="field-label">Full Name</div><div class="field-value">${escHtml(r.name || "–")}</div></div>
      <div class="detail-field"><div class="field-label">Email</div><div class="field-value">${escHtml(r.email || "–")}</div></div>
      <div class="detail-field"><div class="field-label">Phone</div><div class="field-value">${escHtml(r.phone || "–")}</div></div>
      <div class="detail-field"><div class="field-label">ZIP Code</div><div class="field-value">${escHtml(r.zipcode || "–")}</div></div>
      <div class="detail-field"><div class="field-label">State</div><div class="field-value">${escHtml(r.state || "–")}</div></div>
    </div>
    <div class="detail-section">
      <h3>Referral Details</h3>
      <div class="detail-field"><div class="field-label">Program of Interest</div><div class="field-value">${escHtml(r.program_of_interest || r.landing_page || "–")}</div></div>
      <div class="detail-field"><div class="field-label">Landing Page</div><div class="field-value">${escHtml(r.landing_page || "–")}</div></div>
      <div class="detail-field"><div class="field-label">Submitted</div><div class="field-value">${escHtml(r.submitted_at || "–")}</div></div>
      <div class="detail-field"><div class="field-label">Submission ID</div><div class="field-value" style="font-size:.75rem;color:#595959;">${escHtml(r.submission_id || "–")}</div></div>
    </div>
    <div class="detail-section">
      <h3>Motivation</h3>
      <div class="detail-field">
        <div class="field-value" style="white-space:pre-wrap;line-height:1.5;">${escHtml(r.motivation || "–")}</div>
      </div>
      <h3 style="margin-top:20px;">Update Status</h3>
      <div class="detail-actions">
        <select class="status-select" id="sel_${r.submission_id}" aria-label="Status for ${escHtml(r.name || r.submission_id)}">
          ${["new", "contacted", "enrolled", "not_eligible", "no_response"]
            .map(
              (s) =>
                `<option value="${s}"${r.status === s ? " selected" : ""}>${statusLabel(s)}</option>`,
            )
            .join("")}
        </select>
        <button class="btn btn-save" onclick="saveStatus('${r.submission_id}', event)" aria-label="Save status for ${escHtml(r.name || r.submission_id)}">Save</button>
        <span class="save-msg" role="status" id="msg_${r.submission_id}">✓ Saved</span>
      </div>
    </div>
  </div>`;
      }

      // ── Toggle Expand ─────────────────────────────────────────────────────────────
      function toggleExpand(id) {
        expandedId = expandedId === id ? null : id;
        renderTable();
      }

      // ── Save Status ───────────────────────────────────────────────────────────────
      async function saveStatus(id, e) {
        e.stopPropagation();
        const sel = document.getElementById(`sel_${id}`);
        const msg = document.getElementById(`msg_${id}`);
        const newStatus = sel.value;

        try {
          await Auth.ensureValidToken();
          const update_referral_response = await fetch(`${API_BASE}/referrals/${id}`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${Auth.getToken()}`,
            },
            body: JSON.stringify({ status: newStatus }),
          });
          if (!update_referral_response.ok) throw new Error(`HTTP ${update_referral_response.status}`);

          // Update local data
          const idx = allReferrals.findIndex((r) => r.submission_id === id);
          if (idx !== -1) allReferrals[idx].status = newStatus;
          const fidx = filtered.findIndex((r) => r.submission_id === id);
          if (fidx !== -1) filtered[fidx].status = newStatus;

          msg.style.display = "inline";
          setTimeout(() => {
            msg.style.display = "none";
          }, 2500);
          updateStats();

          // Re-render just the row badge without collapsing
          const detailRow = e.target.closest("tr");
          const summaryRow =
            detailRow &&
            detailRow.classList.contains("detail-row") &&
            detailRow.previousElementSibling &&
            !detailRow.previousElementSibling.classList.contains("detail-row")
              ? detailRow.previousElementSibling
              : null;
          if (summaryRow) {
            const statusCell = summaryRow.cells[3];
            if (statusCell) statusCell.innerHTML = statusBadge(newStatus);
          }
        } catch (err) {
          alert("Failed to update status: " + err.message);
        }
      }

      // ── Helpers ───────────────────────────────────────────────────────────────────
      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatDate(iso) {
        if (!iso) return "–";
        try {
          const d = new Date(iso);
          return (
            d.toLocaleDateString("en-US", {
              month: "short",
              day: "numeric",
              year: "numeric",
            }) +
            " " +
            d.toLocaleTimeString("en-US", {
              hour: "2-digit",
              minute: "2-digit",
            })
          );
        } catch {
          return iso;
        }
      }

      function shortId(id) {
        if (!id || id.length <= 16) return id || "";
        return `${id.slice(0, 8)}...${id.slice(-4)}`;
      }

      function statusBadge(s) {
        const labels = {
          new: "New",
          contacted: "Contacted",
          enrolled: "Enrolled",
          not_eligible: "Not Eligible",
          no_response: "No Response",
        };
        return `<span class="badge badge-${s || "new"}">${labels[s] || s || "New"}</span>`;
      }

      function statusLabel(s) {
        return (
          {
            new: "New",
            contacted: "Contacted",
            enrolled: "Enrolled",
            not_eligible: "Not Eligible",
            no_response: "No Response",
          }[s] || s
        );
      }

      function programBadge(p) {
        const cls =
          p === "Lose Weight"
            ? "prog-lw"
            : p === "Lower Blood Pressure"
              ? "prog-bp"
              : "prog-bs";
        return `<span class="prog ${cls}">${escHtml(p || "–")}</span>`;
      }
    </script>
  </body>
</html>
