AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HALT Program Landing Pages – AWS GovCloud
  Resources: S3 static site bucket, DynamoDB submissions table,
  HTTP API Gateway, Lambda form handler with SES notification,
  Cognito User Pool for dashboard authentication.
  PII is stored in DynamoDB (GovCloud). Notification emails
  contain no PII — only a link to the secure dashboard.

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  ProjectName:
    Type: String
    Default: halt-landing
    Description: Short name used as a prefix for all resource names/IDs.

  LambdaZipS3Bucket:
    Type: String
    Description: >
      Name of the S3 bucket (in the same GovCloud region) that holds the
      Lambda deployment package ZIP. Upload handler.zip here first.

  LambdaZipS3Key:
    Type: String
    Default: handler.zip
    Description: S3 key (path) of the Lambda ZIP file.

  AllowedOrigin:
    Type: String
    Description: >
      CORS allowed origin. Must be set to your site domain
      (e.g. https://www.haltreferral.org). No default — must be provided.

  SenderEmail:
    Type: String
    Default: no-reply@haltreferral.org
    Description: >
      SES-verified sender address for notification emails.
      Must be verified in SES before use (domain or individual address).

  NotificationEmail:
    Type: String
    Default: support@halt360.org
    Description: >
      Where to send new-referral notifications. No PII is included
      in the email — only a link to the GovCloud dashboard.

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:
  # ── S3 Bucket for static site ─────────────────────────────────────────────

  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: "www.haltreferral.org"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ── DynamoDB Table for intake submissions ─────────────────────────────────

  IntakeSubmissionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-intake-submissions"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: submission_id
          AttributeType: S
        - AttributeName: submitted_at
          AttributeType: S
        - AttributeName: landing_page
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: state
          AttributeType: S
      KeySchema:
        - AttributeName: submission_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by-program
          KeySchema:
            - AttributeName: landing_page
              KeyType: HASH
            - AttributeName: submitted_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: by-date
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: submitted_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: by-state
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: submitted_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ── Cognito User Pool ─────────────────────────────────────────────────────

  DashboardUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-dashboard-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: "Your HALT Dashboard Login"
          EmailMessage: >
            You have been invited to access the HALT Referral Dashboard.
            Your username is {username} and your temporary password is {####}.
            Please log in and change your password on first sign-in.
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: state
          AttributeDataType: String
          Mutable: true
          Required: false
          StringAttributeConstraints:
            MinLength: "2"
            MaxLength: "50"
      UserPoolTags:
        Project: !Ref ProjectName

  DashboardUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-dashboard-client"
      UserPoolId: !Ref DashboardUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      TokenValidityUnits:
        IdToken: hours
        AccessToken: hours
        RefreshToken: days
      IdTokenValidity: 1
      AccessTokenValidity: 1
      RefreshTokenValidity: 30
      PreventUserExistenceErrors: ENABLED

  # ── Lambda Execution Role ─────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws-us-gov:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDbAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt IntakeSubmissionsTable.Arn
                  - !Sub "${IntakeSubmissionsTable.Arn}/index/*"
        - PolicyName: SesSendNotification
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
        - PolicyName: CognitoUserManagement
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminEnableUser
                  - cognito-idp:AdminDisableUser
                Resource: !GetAtt DashboardUserPool.Arn

  # ── Lambda Function ───────────────────────────────────────────────────────

  ProgramIntakeLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-intake-handler"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaZipS3Bucket
        S3Key: !Ref LambdaZipS3Key
      Environment:
        Variables:
          TABLE_NAME: !Ref IntakeSubmissionsTable
          USER_POOL_ID: !Ref DashboardUserPool
          ADMIN_GROUP_NAME: admin
          SENDER_EMAIL: !Ref SenderEmail
          NOTIFICATION_EMAIL: !Ref NotificationEmail
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ── API Gateway HTTP API ──────────────────────────────────────────────────

  ProgramIntakeApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods: [GET, POST, PATCH, OPTIONS]
        AllowHeaders: [Content-Type, Authorization]
        MaxAge: 300

  DashboardAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      Name: !Sub "${ProjectName}-cognito-authorizer"
      ApiId: !Ref ProgramIntakeApi
      AuthorizerType: JWT
      IdentitySource:
        - "$request.header.Authorization"
      JwtConfiguration:
        Audience:
          - !Ref DashboardUserPoolClient
        Issuer: !Sub
          - "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
          - UserPoolId: !Ref DashboardUserPool

  ProgramIntakeLambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ProgramIntakeApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - "arn:aws-us-gov:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations"
        - LambdaArn: !GetAtt ProgramIntakeLambda.Arn
      PayloadFormatVersion: "2.0"

  ProgramIntakeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ProgramIntakeApi
      RouteKey: "POST /program-intake"
      Target: !Sub "integrations/${ProgramIntakeLambdaIntegration}"

  GetReferralsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ProgramIntakeApi
      RouteKey: "GET /referrals"
      AuthorizationType: JWT
      AuthorizerId: !Ref DashboardAuthorizer
      Target: !Sub "integrations/${ProgramIntakeLambdaIntegration}"

  UpdateReferralRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ProgramIntakeApi
      RouteKey: "PATCH /referrals/{id}"
      AuthorizationType: JWT
      AuthorizerId: !Ref DashboardAuthorizer
      Target: !Sub "integrations/${ProgramIntakeLambdaIntegration}"

  ListUsersRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ProgramIntakeApi
      RouteKey: "GET /admin/users"
      AuthorizationType: JWT
      AuthorizerId: !Ref DashboardAuthorizer
      Target: !Sub "integrations/${ProgramIntakeLambdaIntegration}"

  CreateUserRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ProgramIntakeApi
      RouteKey: "POST /admin/users"
      AuthorizationType: JWT
      AuthorizerId: !Ref DashboardAuthorizer
      Target: !Sub "integrations/${ProgramIntakeLambdaIntegration}"

  ToggleUserRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ProgramIntakeApi
      RouteKey: "PATCH /admin/users"
      AuthorizationType: JWT
      AuthorizerId: !Ref DashboardAuthorizer
      Target: !Sub "integrations/${ProgramIntakeLambdaIntegration}"

  ProgramIntakeApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ProgramIntakeApi
      StageName: "$default"
      AutoDeploy: true

  ApiGatewayLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProgramIntakeLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws-us-gov:execute-api:${AWS::Region}:${AWS::AccountId}:${ProgramIntakeApi}/*"

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  StaticSiteBucketName:
    Description: S3 bucket for your HTML/CSS/JS files
    Value: !Ref StaticSiteBucket

  IntakeSubmissionsTableName:
    Description: DynamoDB table where form submissions are stored (PII stays here)
    Value: !Ref IntakeSubmissionsTable

  ApiGatewayEndpoint:
    Description: API Gateway endpoint – replace YOUR_API_GATEWAY_URL in the 3 HTML files
    Value: !Sub "https://${ProgramIntakeApi}.execute-api.${AWS::Region}.amazonaws.com"

  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref ProgramIntakeLambda

  ApiGatewayId:
    Description: API Gateway ID – used to update CORS settings
    Value: !Ref ProgramIntakeApi

  UserPoolId:
    Description: Cognito User Pool ID – needed in auth.js
    Value: !Ref DashboardUserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID – needed in auth.js
    Value: !Ref DashboardUserPoolClient
